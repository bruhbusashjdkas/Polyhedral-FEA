name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # Anti-cheat: no numeric reference values may live in solver code
  # (BENCHMARKS.md rule 4). Grep is intentionally crude; hits need human review.
  grep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No bench/reference reads outside bench crate
        run: |
          ! grep -rn "bench/reference" crates/geom crates/mesh crates/adapt crates/fea crates/cli --include='*.rs'
