name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libeigen3-dev nlohmann-json3-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
      - name: Build (warnings are errors)
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clang-format check
        run: |
          find apps src tests -name '*.cpp' -o -name '*.hpp' -o -name '*.cu' \
            | xargs clang-format --dry-run --Werror

  grep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No bench/reference reads outside the bench module
        run: |
          ! grep -rn "bench/reference" src/geom src/mesh src/adapt src/fea src/pipeline apps
