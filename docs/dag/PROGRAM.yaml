# Polyhedral-FEA adaptive-core program DAG.
# THE pick-up-anywhere artifact: any agent/session resumes by reading this
# file, claiming a node whose deps are all `done`, setting it `in_progress`,
# and committing the status flip with the work. Keep statuses honest —
# `done` means built, tested, and documented, not "mostly there".
#
# Statuses: todo | in_progress | done | blocked (note why in `note:`)
# Parallel lanes: nodes with disjoint `scope:` paths may run concurrently.
# See interfaces.md for the normative file schemas nodes communicate through.

program: adaptive-polyhedral-core
goal: >
  Adaptive order + adaptive size + adaptive element shape working together
  (tet/hex/pyramid/arbitrary polyhedra in one part, mixed FE+VEM, arbitrary-p
  hierarchical basis), with an automated test lab that measures mesh-gen
  time / accuracy / solve time per geometric condition and recursively feeds
  the best settings back into the defaults. Quality ahead of all else.

nodes:
  # ── Lane 0: coordination ────────────────────────────────────────────────
  - id: dag-workflow
    title: DAG workflow + normative interface schemas
    status: done
    deps: []
    scope: [docs/dag/]
    note: This file, README.md, interfaces.md.

  # ── Lane A: test lab (scaffolding) ──────────────────────────────────────
  - id: testlab-harness
    title: Campaign runner with pause/play, resource caps, branch trimming
    status: done
    deps: [dag-workflow]
    scope: [apps/testlab/, bench/campaigns/]
    note: >
      DONE: polymesh_testlab CLI (run|resume|pause-status) with successive-halving,
      SIGINT-safe atomic checkpoint.json, results.jsonl, progress.json. Smoke
      campaign bench/campaigns/smoke finishes green on smoke_bar (hex + hybrid_zoo).
      Truths loaded only from bench/reference/*.json. Probe aliases for max_vm etc.

  - id: part-library
    title: Validation part library + hand-calculation references
    status: done
    deps: [dag-workflow]
    scope: [tests/fixtures/parts/, bench/reference/, docs/validation/]
    note: >
      DONE: three solid fixtures (smoke_bar, plate_hole, cantilever) each with
      .stl + .case.json + bench/reference/<name>.json (interfaces.md §4–§5) and
      full derivations in docs/validation/hand-calcs.md. smoke_bar: uniaxial
      bar σ_vm=1e6 Pa, tip ux=5e-7 m. plate_hole: Kirsch SCF=3.0.
      cantilever: Timoshenko tip deflection 2.0153e-4 m. Generator
      scripts/gen_part_library.py (geometry only; truths hand-authored).
      Anti-cheat: truths only in bench/reference/ and docs/validation/.

  - id: gui-testlab
    title: GUI panel rebuild (Test Lab / Sim Setup / Results)
    status: done
    deps: [dag-workflow]
    scope: [apps/gui/]
    note: >
      DONE: layout Test Lab | Sim Setup | viewport | Results. ImGui-free
      testlab_data parsers (unit-tested), ProcessRunner fork/exec + SIGINT pause,
      talks to harness only via interfaces.md files. hybrid VEM mesher retained.

  - id: campaign-1
    title: First full settings campaign on the part library
    status: todo
    deps: [testlab-harness, part-library]
    scope: [bench/campaigns/]
    note: >
      No stone unturned: full mesher option grid at tier 0, trimmed
      aggressively at higher tiers. Output = Pareto frontier per geometric
      condition class.

  # ── Lane B: solver core (lead) ──────────────────────────────────────────
  - id: adr-0019
    title: "ADR-0019: mixed FE+VEM adaptive-order core"
    status: done
    deps: [dag-workflow]
    scope: [docs/decisions/]
    note: docs/decisions/0019-mixed-fe-vem-adaptive-order-core.md (committed).

  - id: p-hierarchical
    title: Hierarchical arbitrary-p basis (integrated Legendre) + MMS tests
    status: done
    deps: [adr-0019]
    scope: [src/fea/]
    note: >
      DONE: fea/hierarchical.{hpp,cpp} — 1D Lobatto basis + derivatives; hex
      tensor-product modes order 1..4; tet vertex + quadratic edge bubbles
      (order 1..2); subparametric single-element stiffness. fea/hp_assembly
      .{hpp,cpp} — per-entity global DOF numbering with the minimum rule,
      conforming assembly, body load, partitioned solve, energy-norm error.
      Tests (test_hierarchical + test_hp_assembly): 1D identities, p=1 ==
      nodal hex8/tet4, six rigid-body modes on distorted geometry, mixed
      p1/p2 constant-strain patch reproduced to 0 error, MMS energy-norm
      rate p=1 -> 1.00 and p=2 -> 2.00. Full suite 157 cases green.
      FOLLOW-ON (tracked in node p-hierarchical-highp below): p>=3 edge/face
      orientation signs + transforms, tet k>=3 kernels, hex order>4 rule.

  - id: p-hierarchical-highp
    title: Extend hierarchical assembler to p>=3 (orientation) + tet k>=3
    status: done
    deps: [p-hierarchical]
    scope: [src/fea/]
    note: >
      DONE: multi-mode per-entity DOFs (edge/face/interior blocks); tet edge
      odd-bubble sign (-1)^m on reversed (λ_b-λ_a) edges (hex tensor-product
      edge modes do not flip with endpoint order); hex quad-face dihedral
      transform (8 symmetries); tet face/interior kernels order 1..4; hex
      basis order 1..6; Gauss n=6. MMS energy-norm rates (hex, n=2→4):
      p=1 → 1.02, p=2 → 1.99, p=3 → 2.98, p=4 → 3.98. Q2-poly exact at
      p=2,3,4. Full suite 161 cases green.

  - id: fe-vem-assembly
    title: Unified mixed FE+VEM assembly (polyhedra unsplit)
    status: done
    deps: [adr-0019]
    scope: [src/fea/, src/pipeline/, src/mesh/]
    note: >
      LANDED: mixed_fill native_poly_transitions emits one unsplit poly per
      2:1 cell (kPolyVem); VolumeMesher::kHybridVem keeps hex as FE + poly as
      VEM in the same assemble_stiffness K. Gate tests in
      tests/test_fe_vem_assembly.cpp (checkerboard FE/VEM, tet+hex VEM,
      native-poly hybrid, pipeline hybrid-VEM) — constant-strain max err <1e-9.

  - id: mesher-tendency
    title: Element-tendency knob in the meshers (hex/tet/poly preference)
    status: todo
    deps: [fe-vem-assembly]
    scope: [src/mesh/, src/pipeline/]
    note: >
      Continuous dial the tuner can sweep: bulk shape preference, transition
      style (fan-split vs native poly), skin treatment.

  - id: hp-driver
    title: Joint (h, p, shape) adaptive driver
    status: done
    deps: [p-hierarchical, fe-vem-assembly]
    scope: [src/adapt/, src/pipeline/]
    note: >
      DONE: adapt/hp_driver.{hpp,cpp} — decide_element + drive_hp from geometry
      (h·κ, thin-wall), ZZ/surplus smoothness, and DOF cost heuristics; shape
      majority → mesher tendency. SolveJob adapt loop builds signals from ZZ +
      surface κ/t and applies h seeds / p-mark / tendency. Gates in
      tests/test_hp_driver.cpp (curved→h, smooth→p, shape flip, deterministic).
      Docs: solver-core §4 policy.

  - id: solver-docs
    title: Human-readable solver-core documentation
    status: done
    deps: [p-hierarchical, fe-vem-assembly]
    scope: [docs/]
    note: >
      LANDED: docs/solver-core.md — (h,p,shape) core + expanded FE+VEM section
      (kHybridVem, native_poly_transitions, gate tests).

  # ── Lane C: recursive improvement (repeats) ─────────────────────────────
  - id: feedback-loop
    title: Feed campaign results back into defaults (repeatable node)
    status: todo
    deps: [campaign-1, hp-driver]
    scope: [src/pipeline/, bench/campaigns/, docs/]
    note: >
      Analyse accumulated results.jsonl -> update default knob values +
      per-condition presets -> rerun affected campaign slices -> document
      deltas. Re-enter this node every time new sim data accumulates.

  - id: gui-sim-controls
    title: GUI live solve progress + pause/play + resource caps wired
    status: todo
    deps: [gui-testlab, testlab-harness]
    scope: [apps/gui/]
